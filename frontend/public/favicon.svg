<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c0c18"/>
      <stop offset="100%" stop-color="#04040a"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFFFF0"/>
      <stop offset="20%"  stop-color="#FFE040"/>
      <stop offset="58%"  stop-color="#FF9000"/>
      <stop offset="100%" stop-color="#CC3800"/>
    </radialGradient>
    <radialGradient id="sunShd" cx="70%" cy="70%" r="55%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p1" cx="33%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#d0f0ff"/>
      <stop offset="40%"  stop-color="#2a88d8"/>
      <stop offset="100%" stop-color="#061830"/>
    </radialGradient>
    <radialGradient id="p1shd" cx="72%" cy="72%" r="55%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p2" cx="35%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#ffccaa"/>
      <stop offset="42%"  stop-color="#cc4420"/>
      <stop offset="100%" stop-color="#4a0c08"/>
    </radialGradient>
    <radialGradient id="p2shd" cx="70%" cy="70%" r="55%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="p3" cx="34%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#fff0c0"/>
      <stop offset="38%"  stop-color="#d07828"/>
      <stop offset="100%" stop-color="#5a1c04"/>
    </radialGradient>
    <radialGradient id="p3shd" cx="70%" cy="68%" r="55%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="sunGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="atmB" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="atmR" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.0"/></filter>
    <filter id="atmA" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Outer halo -->
  <circle cx="32" cy="32" r="29" stroke="#C4A052" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Orbit traces -->
  <circle cx="32" cy="32" r="12"   stroke="rgba(196,160,82,0.09)" stroke-width="0.6"/>
  <circle cx="32" cy="32" r="21"   stroke="rgba(196,160,82,0.07)" stroke-width="0.6"/>
  <circle cx="32" cy="32" r="28.5" stroke="rgba(196,160,82,0.05)" stroke-width="0.6"/>

  <!-- Sun corona -->
  <circle cx="32" cy="32" r="10" fill="#FF9000" opacity="0.1"  filter="url(#sunGlow)"/>
  <circle cx="32" cy="32" r="7.5" fill="#FFD030" opacity="0.16" filter="url(#sunGlow)"/>
  <!-- Sun sphere -->
  <circle cx="32" cy="32" r="5.2" fill="url(#sun)" filter="url(#sunGlow)"/>
  <circle cx="32" cy="32" r="5.2" fill="url(#sunShd)"/>

  <!-- Blue planet (Earth-like) — top-right on mid orbit -->
  <circle cx="48" cy="18" r="5.5" fill="rgba(50,140,255,0.2)" filter="url(#atmB)"/>
  <circle cx="48" cy="18" r="3.4" fill="url(#p1)"/>
  <circle cx="48" cy="18" r="3.4" fill="url(#p1shd)"/>
  <circle cx="46.3" cy="16.6" r="0.7" fill="white" opacity="0.38"/>

  <!-- Red planet (Mars-like) — bottom-left on inner orbit -->
  <circle cx="22" cy="40" r="3.8" fill="rgba(210,70,30,0.2)" filter="url(#atmR)"/>
  <circle cx="22" cy="40" r="2.4" fill="url(#p2)"/>
  <circle cx="22" cy="40" r="2.4" fill="url(#p2shd)"/>
  <circle cx="21.1" cy="39.1" r="0.45" fill="white" opacity="0.32"/>

  <!-- Gas giant (Saturn-like) — bottom-right on outer orbit -->
  <circle cx="55" cy="44" r="6.5" fill="rgba(210,130,25,0.18)" filter="url(#atmA)"/>
  <!-- Ring behind -->
  <ellipse cx="55" cy="44" rx="7.4" ry="1.6" stroke="rgba(210,155,50,0.45)" stroke-width="1.3" fill="none"/>
  <!-- Sphere -->
  <circle cx="55" cy="44" r="3.8" fill="url(#p3)"/>
  <circle cx="55" cy="44" r="3.8" fill="url(#p3shd)"/>
  <!-- Ring front arc over sphere -->
  <path d="M 47.7 44.3 A 7.4 1.6 0 0 0 62.3 44.3" stroke="rgba(210,155,50,0.42)" stroke-width="1.3" fill="none"/>
  <circle cx="53.7" cy="42.7" r="0.6" fill="white" opacity="0.3"/>
</svg>
